<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>SILVRE</h1>
          <p>Admin Panel</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/index.html" class="nav-item active">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="3" y="3" width="6" height="6" />
              <rect x="11" y="3" width="6" height="6" />
              <rect x="3" y="11" width="6" height="6" />
              <rect x="11" y="11" width="6" height="6" />
            </svg>
            Dashboard
          </a>

          <a href="/products.html" class="nav-item">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <rect x="3" y="3" width="14" height="14" rx="2" />
            </svg>
            Ürünler
          </a>

          <a href="/orders.html" class="nav-item">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M3 3H5L6.5 13H16.5L18 6H6" />
              <circle cx="7" cy="17" r="1" fill="currentColor" />
              <circle cx="15" cy="17" r="1" fill="currentColor" />
            </svg>
            Siparişler
          </a>

          <a href="/categories.html" class="nav-item">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M4 6h12M4 10h12M4 14h12" />
            </svg>
            Kategoriler
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="logout-btn" id="logoutBtn">
            <svg
              width="20"
              height="20"
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M14 16l4-4-4-4M18 12H8M8 16V4" />
            </svg>
            Çıkış Yap
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="content-header">
          <h2>Dashboard</h2>
          <div class="header-actions">
            <span id="currentUser"></span>
          </div>
        </header>

        <!-- Stats Cards -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="3" width="18" height="18" rx="2" />
              </svg>
            </div>
            <div class="stat-content">
              <p class="stat-label">Toplam Ürün</p>
              <h3 class="stat-value" id="totalProducts">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon green">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 3H5L6.5 13H16.5L18 6H6" />
                <circle cx="7" cy="19" r="1" fill="currentColor" />
                <circle cx="15" cy="19" r="1" fill="currentColor" />
              </svg>
            </div>
            <div class="stat-content">
              <p class="stat-label">Bekleyen Sipariş</p>
              <h3 class="stat-value" id="pendingOrders">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon purple">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="8" r="4" />
                <path d="M4 20C4 16 7 13 12 13C17 13 20 16 20 20" />
              </svg>
            </div>
            <div class="stat-content">
              <p class="stat-label">Toplam Müşteri</p>
              <h3 class="stat-value" id="totalCustomers">-</h3>
            </div>
          </div>

          <div class="stat-card">
            <div class="stat-icon orange">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="12" y1="2" x2="12" y2="22" />
                <path
                  d="M17 5H9.5C7.5 5 6 6.5 6 8.5C6 10.5 7.5 12 9.5 12H14.5C16.5 12 18 13.5 18 15.5C18 17.5 16.5 19 14.5 19H6"
                />
              </svg>
            </div>
            <div class="stat-content">
              <p class="stat-label">Bu Ay Satış</p>
              <h3 class="stat-value" id="monthlySales">-</h3>
            </div>
          </div>
        </div>

        <!-- Recent Orders -->
        <div class="content-section">
          <div class="section-header">
            <h3>Son Siparişler</h3>
            <a href="/orders.html" class="link-button">Tümünü Gör →</a>
          </div>

          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>Sipariş No</th>
                  <th>Müşteri</th>
                  <th>Tutar</th>
                  <th>Durum</th>
                  <th>Tarih</th>
                  <th>İşlem</th>
                </tr>
              </thead>
              <tbody id="recentOrdersTable">
                <tr>
                  <td colspan="6" class="loading">Yükleniyor...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- SCRIPT SIRASI ÖNEMLİ! -->
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/dashboard.js"></script>
  </body>
</html>
