<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Giriş - Silvre Jewelry</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .login-container {
        background: white;
        padding: 3rem;
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }

      .logo {
        text-align: center;
        margin-bottom: 2rem;
      }

      .logo h1 {
        font-size: 2rem;
        font-weight: 300;
        letter-spacing: 0.2em;
        color: #2a2a2a;
      }

      .logo p {
        font-size: 0.875rem;
        color: #666;
        margin-top: 0.5rem;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        font-size: 0.9375rem;
        transition: border-color 0.2s;
      }

      .form-input:focus {
        outline: none;
        border-color: #8b7355;
      }

      .btn-login {
        width: 100%;
        padding: 1rem;
        background: #2a2a2a;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }

      .btn-login:hover {
        background: #1a1a1a;
      }

      .btn-login:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 0.875rem;
        border-radius: 6px;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        display: none;
      }

      .error-message.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      // Already logged in? Redirect to dashboard
      const token = localStorage.getItem("silvre_auth_token");
      const userStr = localStorage.getItem("silvre_user");

      if (token && userStr) {
        try {
          const user = JSON.parse(userStr);
          if (user.role === "admin") {
            window.location.replace("/index.html");
          }
        } catch (e) {}
      }
    </script>
    <div class="login-container">
      <div class="logo">
        <h1>SILVRE</h1>
        <p>Admin Panel</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">E-posta</label>
          <input
            type="email"
            id="email"
            class="form-input"
            placeholder="admin@silvre.com"
            required
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Şifre</label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="btn-login" id="loginBtn">Giriş Yap</button>
      </form>
    </div>

    <script>
      // Config
      const API_CONFIG = {
        BASE_URL: "http://localhost:5000/api",
        ENDPOINTS: {
          LOGIN: "/auth/login",
        },
      };

      const STORAGE_KEYS = {
        TOKEN: "silvre_auth_token",
        USER: "silvre_user",
      };

      // API function
      async function login(email, password) {
        const response = await fetch(
          API_CONFIG.BASE_URL + API_CONFIG.ENDPOINTS.LOGIN,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          }
        );

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || "Giriş başarısız");
        }

        return data;
      }
    </script>
    <script>
      const loginForm = document.getElementById("loginForm");
      const loginBtn = document.getElementById("loginBtn");
      const errorMessage = document.getElementById("errorMessage");

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        loginBtn.disabled = true;
        loginBtn.textContent = "Giriş yapılıyor...";
        errorMessage.classList.remove("show");

        try {
          const data = await login(email, password);

          if (data.user.role !== "admin") {
            throw new Error("Bu hesap admin değil");
          }

          // Save token and user
          localStorage.setItem(STORAGE_KEYS.TOKEN, data.token);
          localStorage.setItem(STORAGE_KEYS.USER, JSON.stringify(data.user));

          window.location.href = "/index.html";
        } catch (error) {
          console.error("Login error:", error);
          errorMessage.textContent =
            error.message ||
            "Giriş başarısız. Lütfen bilgilerinizi kontrol edin.";
          errorMessage.classList.add("show");

          loginBtn.disabled = false;
          loginBtn.textContent = "Giriş Yap";
        }
      });
    </script>
  </body>
</html>
