<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ürün Yönetimi - Silvre Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/admin.css" />
    <style>
      /* Galeri Stilleri */
      .image-gallery {
        margin-top: 1rem;
      }
      
      .primary-image-container {
        width: 100%;
        height: 300px;
        border-radius: 8px;
        overflow: hidden;
        background: #1a1d24;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 1rem;
        position: relative;
      }
      
      .primary-image-container img {
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
      }
      
      .primary-image-container .placeholder {
        color: #666;
        text-align: center;
      }
      
      .thumbnail-gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
        gap: 0.5rem;
      }
      
      .thumbnail-item {
        position: relative;
        width: 80px;
        height: 80px;
        border-radius: 4px;
        overflow: hidden;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.3s;
      }
      
      .thumbnail-item:hover {
        border-color: #c9a55c;
      }
      
      .thumbnail-item.primary {
        border-color: #c9a55c;
        box-shadow: 0 0 0 2px rgba(201, 165, 92, 0.3);
      }
      
      .thumbnail-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      
      .thumbnail-item .remove-btn {
        position: absolute;
        top: 2px;
        right: 2px;
        background: rgba(244, 67, 54, 0.9);
        color: white;
        border: none;
        border-radius: 50%;
        width: 20px;
        height: 20px;
        font-size: 12px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
      }
      
      .thumbnail-item:hover .remove-btn {
        display: flex;
      }
      
      .thumbnail-item .primary-badge {
        position: absolute;
        bottom: 2px;
        left: 2px;
        background: rgba(201, 165, 92, 0.9);
        color: white;
        font-size: 10px;
        padding: 2px 4px;
        border-radius: 2px;
      }
      
      .image-upload-area {
        border: 2px dashed #4a5568;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s;
        background: #1a1d24;
      }
      
      .image-upload-area:hover {
        border-color: #c9a55c;
        background: #21252d;
      }
      
      .image-upload-area.dragover {
        border-color: #c9a55c;
        background: #2a2f38;
      }
      
      .upload-text {
        color: #9ca3af;
        margin-top: 0.5rem;
      }
    </style>
  </head>
  <body>
    <div class="admin-container">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <h1>SILVRE</h1>
          <p>Admin Panel</p>
        </div>

        <nav class="sidebar-nav">
          <a href="/index.html" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="6" height="6" />
              <rect x="11" y="3" width="6" height="6" />
              <rect x="3" y="11" width="6" height="6" />
              <rect x="11" y="11" width="6" height="6" />
            </svg>
            Dashboard
          </a>

          <a href="/products.html" class="nav-item active">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="14" height="14" rx="2" />
            </svg>
            Ürünler
          </a>

          <a href="/orders.html" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M3 3H5L6.5 13H16.5L18 6H6" />
              <circle cx="7" cy="17" r="1" fill="currentColor" />
              <circle cx="15" cy="17" r="1" fill="currentColor" />
            </svg>
            Siparişler
          </a>

          <a href="/categories.html" class="nav-item">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M4 6h12M4 10h12M4 14h12" />
            </svg>
            Kategoriler
          </a>
        </nav>

        <div class="sidebar-footer">
          <button class="logout-btn" id="logoutBtn">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M14 16l4-4-4-4M18 12H8M8 16V4" />
            </svg>
            Çıkış Yap
          </button>
        </div>
      </aside>

      <!-- Main Content -->
      <main class="main-content">
        <header class="content-header">
          <h2>Ürün Yönetimi</h2>
          <button class="btn btn-primary" id="addProductBtn">
            + Yeni Ürün
          </button>
        </header>

        <!-- Filters -->
        <div class="filters-row" style="margin-bottom: 2rem;">
          <select class="form-select" id="categoryFilter" style="max-width: 200px;">
            <option value="">Tüm Kategoriler</option>
          </select>

          <select class="form-select" id="statusFilter" style="max-width: 150px;">
            <option value="">Tüm Durumlar</option>
            <option value="active">Aktif</option>
            <option value="inactive">Pasif</option>
          </select>
          
          <select class="form-select" id="featuredFilter" style="max-width: 180px;">
            <option value="">Tümü</option>
            <option value="featured">Öne Çıkanlar</option>
            <option value="not-featured">Öne Çıkan Olmayanlar</option>
          </select>

          <input
            type="text"
            class="form-input"
            id="searchInput"
            placeholder="Ürün ara..."
            style="max-width: 300px;"
          />
        </div>

        <!-- Products Table -->
        <div class="table-container">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width: 80px;">Resim</th>
                <th>Ürün Adı</th>
                <th>Kategori</th>
                <th>Fiyat</th>
                <th>Stok</th>
                <th>Öne Çıkan</th>
                <th>Durum</th>
                <th>İşlem</th>
              </tr>
            </thead>
            <tbody id="productsTable">
              <tr>
                <td colspan="8" class="loading">Yükleniyor...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
      <div class="modal-content" style="max-width: 700px;">
        <div class="modal-header">
          <h3 id="modalTitle">Yeni Ürün</h3>
          <button class="close-btn" id="closeModal">&times;</button>
        </div>
        <div class="modal-body">
          <form id="productForm">
            <input type="hidden" id="productId" />

            <!-- Görsel Galerisi -->
            <div class="form-group">
              <label class="form-label">Ürün Görselleri</label>
              
              <!-- Ana Görsel -->
              <div class="primary-image-container" id="primaryImageContainer">
                <div class="placeholder">
                  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                  <p style="margin-top: 0.5rem;">Ana Görsel</p>
                </div>
              </div>
              
              <!-- Küçük Resimler -->
              <div class="thumbnail-gallery" id="thumbnailGallery"></div>
              
              <!-- Upload Alanı -->
              <div class="image-upload-area" id="imageUploadArea" style="margin-top: 1rem;">
                <input
                  type="file"
                  id="productImages"
                  accept="image/*"
                  multiple
                  style="display: none;"
                />
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                  <path d="M12 5v14M5 12h14"/>
                </svg>
                <p class="upload-text">Görsel eklemek için tıklayın (Çoklu seçim yapabilirsiniz)</p>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label">Ürün Adı *</label>
              <input type="text" class="form-input" id="productName" required />
            </div>

            <div class="form-group">
              <label class="form-label">Kategori *</label>
              <select class="form-select" id="productCategory" required>
                <option value="">Seçiniz</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Açıklama</label>
              <textarea class="form-textarea" id="productDescription" rows="4"></textarea>
            </div>

            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem;">
              <div class="form-group">
                <label class="form-label">Fiyat (₺) *</label>
                <input type="number" class="form-input" id="productPrice" step="0.01" min="0" required />
              </div>

              <div class="form-group">
                <label class="form-label">İndirimli Fiyat (₺)</label>
                <input type="number" class="form-input" id="productDiscountPrice" step="0.01" min="0" />
              </div>

              <div class="form-group">
                <label class="form-label">Stok Miktarı *</label>
                <input type="number" class="form-input" id="productStock" min="0" required />
              </div>

              <div class="form-group">
                <label class="form-label">SKU</label>
                <input type="text" class="form-input" id="productSku" />
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="productFeatured" />
                <span>Öne Çıkan Ürün</span>
              </label>
            </div>

            <div class="form-group">
              <label class="form-label" style="display: flex; align-items: center; gap: 0.5rem;">
                <input type="checkbox" id="productActive" checked />
                <span>Aktif</span>
              </label>
            </div>

            <div style="display: flex; gap: 1rem; justify-content: flex-end; margin-top: 2rem;">
              <button type="button" class="btn btn-secondary" id="cancelBtn">
                İptal
              </button>
              <button type="submit" class="btn btn-primary" id="saveBtn">
                Kaydet
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/admin.js"></script>
    <script>
      let allProducts = [];
      let categories = [];
      let currentFilter = { category: "", status: "", featured: "", search: "" };
      let productImages = [];
      let imagesToDelete = []; // Silinecek resim ID'leri

      document.addEventListener("DOMContentLoaded", async () => {
        await loadCategories();
        await loadProducts();
        initFilters();
        initModal();
        initImageUpload();
      });

      async function loadCategories() {
        try {
          const data = await api.getCategories();
          categories = data.categories || [];

          const categoryFilter = document.getElementById("categoryFilter");
          const productCategory = document.getElementById("productCategory");

          categories.forEach((cat) => {
            categoryFilter.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
            productCategory.innerHTML += `<option value="${cat.id}">${cat.name}</option>`;
          });
        } catch (error) {
          console.error("Load categories error:", error);
        }
      }

      async function loadProducts() {
        const tableBody = document.getElementById("productsTable");

        try {
          const data = await api.getProducts({ limit: 1000 });
          allProducts = data.products || [];
          applyFilters();
        } catch (error) {
          console.error("Load products error:", error);
          tableBody.innerHTML = `
            <tr>
              <td colspan="8" style="text-align: center; padding: 2rem; color: #f44336;">
                Ürünler yüklenirken hata oluştu: ${error.message}
              </td>
            </tr>
          `;
        }
      }

      function applyFilters() {
        let filtered = allProducts;

        if (currentFilter.category) {
          filtered = filtered.filter((p) => p.category_id == currentFilter.category);
        }

        if (currentFilter.status === "active") {
          filtered = filtered.filter((p) => p.is_active);
        } else if (currentFilter.status === "inactive") {
          filtered = filtered.filter((p) => !p.is_active);
        }
        
        // ✅ Öne Çıkan filtresi
        if (currentFilter.featured === "featured") {
          filtered = filtered.filter((p) => p.is_featured === 1 || p.is_featured === true);
        } else if (currentFilter.featured === "not-featured") {
          filtered = filtered.filter((p) => p.is_featured === 0 || p.is_featured === false);
        }

        if (currentFilter.search) {
          const search = currentFilter.search.toLowerCase();
          filtered = filtered.filter(
            (p) =>
              p.name.toLowerCase().includes(search) ||
              (p.sku && p.sku.toLowerCase().includes(search))
          );
        }

        renderProducts(filtered);
      }

      function renderProducts(products) {
        const tableBody = document.getElementById("productsTable");

        if (products.length === 0) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="8" style="text-align: center; padding: 2rem; color: #999;">
                Ürün bulunamadı
              </td>
            </tr>
          `;
          return;
        }

        tableBody.innerHTML = products.map((product) => {
          let imageUrl = product.primary_image || '';
          if (imageUrl && !imageUrl.startsWith('http')) {
            const baseUrl = API_CONFIG.BASE_URL.replace('/api', '');
            imageUrl = `${baseUrl}${imageUrl}`;
          }
          
          return `
          <tr>
            <td>
              ${imageUrl 
                ? `<img src="${imageUrl}" style="width: 60px; height: 60px; object-fit: cover; border-radius: 4px;" />`
                : `<div style="width: 60px; height: 60px; background: #2a2f38; border-radius: 4px;"></div>`
              }
            </td>
            <td>${product.name}</td>
            <td>${product.category_name || "-"}</td>
            <td>${formatPrice(product.price)}</td>
            <td>${product.stock_quantity || 0}</td>
            <td>
              ${
                product.is_featured
                  ? '<span class="badge badge-warning" style="background: #c9a55c; color: white;">⭐ Öne Çıkan</span>'
                  : '<span class="badge badge-secondary">-</span>'
              }
            </td>
            <td>
              ${
                product.is_active
                  ? '<span class="badge badge-success">Aktif</span>'
                  : '<span class="badge badge-secondary">Pasif</span>'
              }
            </td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="editProduct(${product.id})">
                Düzenle
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteProduct(${product.id}, '${product.name}')">
                Sil
              </button>
            </td>
          </tr>
        `}).join("");
      }

      function initFilters() {
        document.getElementById("categoryFilter").addEventListener("change", (e) => {
          currentFilter.category = e.target.value;
          applyFilters();
        });

        document.getElementById("statusFilter").addEventListener("change", (e) => {
          currentFilter.status = e.target.value;
          applyFilters();
        });
        
        // ✅ Öne Çıkan filtresi
        document.getElementById("featuredFilter").addEventListener("change", (e) => {
          currentFilter.featured = e.target.value;
          applyFilters();
        });

        document.getElementById("searchInput").addEventListener("input", (e) => {
          currentFilter.search = e.target.value;
          applyFilters();
        });
      }

      function initModal() {
        const modal = document.getElementById("productModal");
        const addBtn = document.getElementById("addProductBtn");
        const closeBtn = document.getElementById("closeModal");
        const cancelBtn = document.getElementById("cancelBtn");
        const form = document.getElementById("productForm");

        addBtn.addEventListener("click", () => {
          openModal();
        });

        closeBtn.addEventListener("click", () => {
          modal.classList.remove("active");
          resetForm();
        });

        cancelBtn.addEventListener("click", () => {
          modal.classList.remove("active");
          resetForm();
        });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          await saveProduct();
        });
      }

      function initImageUpload() {
        const uploadArea = document.getElementById("imageUploadArea");
        const fileInput = document.getElementById("productImages");

        uploadArea.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", handleImageSelect);

        uploadArea.addEventListener("dragover", (e) => {
          e.preventDefault();
          uploadArea.classList.add("dragover");
        });

        uploadArea.addEventListener("dragleave", () => {
          uploadArea.classList.remove("dragover");
        });

        uploadArea.addEventListener("drop", (e) => {
          e.preventDefault();
          uploadArea.classList.remove("dragover");
          
          const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith("image/"));
          if (files.length > 0) {
            addImagesToGallery(files);
          }
        });
      }

      function handleImageSelect() {
        const fileInput = document.getElementById("productImages");
        if (fileInput.files && fileInput.files.length > 0) {
          const files = Array.from(fileInput.files);
          addImagesToGallery(files);
        }
      }

      function addImagesToGallery(files) {
        files.forEach((file, index) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const isPrimary = productImages.length === 0;
            productImages.push({
              file: file,
              url: e.target.result,
              isPrimary: isPrimary
            });
            renderGallery();
          };
          reader.readAsDataURL(file);
        });
      }

      function renderGallery() {
        const primaryContainer = document.getElementById("primaryImageContainer");
        const thumbnailGallery = document.getElementById("thumbnailGallery");
        
        const primaryImage = productImages.find(img => img.isPrimary);
        if (primaryImage) {
          primaryContainer.innerHTML = `<img src="${primaryImage.url}" alt="Primary" />`;
        } else {
          primaryContainer.innerHTML = `
            <div class="placeholder">
              <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              <p style="margin-top: 0.5rem;">Ana Görsel</p>
            </div>
          `;
        }
        
        thumbnailGallery.innerHTML = productImages.map((img, index) => `
          <div class="thumbnail-item ${img.isPrimary ? 'primary' : ''}" onclick="setPrimaryImage(${index})">
            <img src="${img.url}" alt="Thumbnail ${index + 1}" />
            <button class="remove-btn" onclick="event.stopPropagation(); removeImage(${index})">×</button>
            ${img.isPrimary ? '<span class="primary-badge">Ana</span>' : ''}
          </div>
        `).join('');
      }

      function setPrimaryImage(index) {
        productImages.forEach((img, i) => {
          img.isPrimary = (i === index);
        });
        renderGallery();
      }

      function removeImage(index) {
        const removedImage = productImages[index];
        
        // Mevcut resimse silinecekler listesine ekle
        if (removedImage.existing && removedImage.id) {
          imagesToDelete.push(removedImage.id);
        }
        
        const wasPrimary = productImages[index].isPrimary;
        productImages.splice(index, 1);
        
        if (wasPrimary && productImages.length > 0) {
          productImages[0].isPrimary = true;
        }
        
        renderGallery();
      }

      function openModal(productId = null) {
        const modal = document.getElementById("productModal");
        const modalTitle = document.getElementById("modalTitle");

        if (productId) {
          modalTitle.textContent = "Ürün Düzenle";
          loadProductData(productId);
        } else {
          modalTitle.textContent = "Yeni Ürün";
          resetForm();
        }

        modal.classList.add("active");
      }

      async function loadProductData(productId) {
        const product = allProducts.find((p) => p.id === productId);
        if (!product) return;

        document.getElementById("productId").value = product.id;
        document.getElementById("productName").value = product.name;
        document.getElementById("productCategory").value = product.category_id;
        document.getElementById("productDescription").value = product.description || "";
        document.getElementById("productPrice").value = product.price;
        document.getElementById("productDiscountPrice").value = product.discount_price || "";
        document.getElementById("productStock").value = product.stock_quantity || 0;
        document.getElementById("productSku").value = product.sku || "";
        document.getElementById("productFeatured").checked = product.is_featured;
        document.getElementById("productActive").checked = product.is_active;

        try {
          const fullProduct = await api.getProduct(product.id);
          if (fullProduct.images && fullProduct.images.length > 0) {
            productImages = fullProduct.images.map(img => {
              let imageUrl = img.image_url;
              if (!imageUrl.startsWith('http')) {
                const baseUrl = API_CONFIG.BASE_URL.replace('/api', '');
                imageUrl = `${baseUrl}${imageUrl}`;
              }
              return {
                id: img.id,
                url: imageUrl,
                isPrimary: img.is_primary === 1,
                existing: true
              };
            });
            renderGallery();
          }
        } catch (error) {
          console.error("Load product images error:", error);
        }
      }

      function resetForm() {
        document.getElementById("productForm").reset();
        document.getElementById("productId").value = "";
        document.getElementById("productActive").checked = true;
        productImages = [];
        imagesToDelete = [];
        renderGallery();
      }

      async function saveProduct() {
        const productId = document.getElementById("productId").value;
        const saveBtn = document.getElementById("saveBtn");

        const productData = {
          category_id: parseInt(document.getElementById("productCategory").value),
          name: document.getElementById("productName").value.trim(),
          description: document.getElementById("productDescription").value.trim(),
          price: parseFloat(document.getElementById("productPrice").value),
          discount_price: document.getElementById("productDiscountPrice").value
            ? parseFloat(document.getElementById("productDiscountPrice").value)
            : null,
          stock_quantity: parseInt(document.getElementById("productStock").value),
          sku: document.getElementById("productSku").value.trim() || null,
          is_featured: document.getElementById("productFeatured").checked,
          is_active: document.getElementById("productActive").checked,
        };

        saveBtn.disabled = true;
        saveBtn.textContent = "Kaydediliyor...";

        try {
          let savedProductId = productId;
          
          if (productId) {
            await api.updateProduct(productId, productData);
          } else {
            const result = await api.createProduct(productData);
            savedProductId = result.productId;
          }

          // 1. Silinecek resimleri sil
          if (imagesToDelete.length > 0) {
            await deleteProductImages();
          }

          // 2. Yeni resimleri yükle
          if (savedProductId) {
            await uploadProductImages(savedProductId);
          }

          // 3. Mevcut resimlerin primary durumunu güncelle
          if (productId && savedProductId) {
            await updateExistingImagesPrimary(savedProductId);
          }

          alert(productId ? "Ürün güncellendi" : "Ürün eklendi");
          document.getElementById("productModal").classList.remove("active");
          await loadProducts();
          resetForm();
        } catch (error) {
          console.error("Save product error:", error);
          alert("Hata: " + error.message);
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = "Kaydet";
        }
      }

      async function deleteProductImages() {
        try {
          for (const imageId of imagesToDelete) {
            await api.deleteProductImage(imageId);
          }
          imagesToDelete = [];
        } catch (error) {
          console.error("Delete images error:", error);
          throw new Error("Görseller silinirken hata oluştu");
        }
      }

      async function uploadProductImages(productId) {
        try {
          const newImages = productImages.filter(img => img.file);
          
          for (let i = 0; i < newImages.length; i++) {
            const img = newImages[i];
            const formData = new FormData();
            formData.append("image", img.file);

            const uploadResult = await api.uploadImage(formData);
            
            let imageUrl = uploadResult.imageUrl;
            if (!imageUrl.startsWith('http')) {
              const baseUrl = API_CONFIG.BASE_URL.replace('/api', '');
              imageUrl = `${baseUrl}${imageUrl}`;
            }
            
            await api.addImageToProduct(productId, {
              imageUrl: imageUrl,
              isPrimary: img.isPrimary ? 1 : 0,
              displayOrder: i
            });
          }
        } catch (error) {
          console.error("Image upload error:", error);
          throw new Error("Görseller yüklenirken hata oluştu");
        }
      }

      async function updateExistingImagesPrimary(productId) {
        try {
          const existingImages = productImages.filter(img => img.existing && img.id);
          
          for (const img of existingImages) {
            await api.updateProductImagePrimary(img.id, img.isPrimary ? 1 : 0);
          }
        } catch (error) {
          console.error("Update image primary error:", error);
        }
      }

      async function editProduct(productId) {
        openModal(productId);
      }

      async function deleteProduct(productId, productName) {
        if (!confirm(`"${productName}" ürününü silmek istediğinize emin misiniz?`)) {
          return;
        }

        try {
          await api.deleteProduct(productId);
          alert("Ürün silindi");
          await loadProducts();
        } catch (error) {
          console.error("Delete product error:", error);
          alert("Ürün silinirken hata oluştu: " + error.message);
        }
      }
    </script>
  </body>
</html>
