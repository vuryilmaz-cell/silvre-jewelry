<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sayfa Bulunamadı (404) | Silvre Jewelry</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .error-404 {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
    }
    
    .error-404-content {
      max-width: 600px;
    }
    
    .error-404-code {
      font-size: 8rem;
      font-weight: 300;
      color: var(--color-accent);
      line-height: 1;
      margin-bottom: 1rem;
    }
    
    .error-404-title {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 1rem;
      color: var(--color-off-black);
    }
    
    .error-404-text {
      font-size: 1.125rem;
      color: var(--color-text);
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    
    .error-404-links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .error-404-link {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--color-accent);
      color: white;
      text-decoration: none;
      border-radius: 4px;
      transition: all 0.3s;
    }
    
    .error-404-link:hover {
      background: var(--color-off-black);
      transform: translateY(-2px);
    }
    
    .error-404-link.secondary {
      background: transparent;
      color: var(--color-accent);
      border: 1px solid var(--color-accent);
    }
    
    .error-404-link.secondary:hover {
      background: var(--color-accent);
      color: white;
    }
    
    .popular-products {
      margin-top: 3rem;
      padding-top: 3rem;
      border-top: 1px solid var(--color-border);
    }
    
    .popular-products h3 {
      font-size: 1.5rem;
      margin-bottom: 1.5rem;
      color: var(--color-off-black);
    }
    
    .popular-products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
    }
    
    .popular-product-item {
      text-align: center;
    }
    
    .popular-product-item img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 0.5rem;
    }
    
    .popular-product-item a {
      text-decoration: none;
      color: var(--color-text);
      font-size: 0.875rem;
    }
    
    .popular-product-item a:hover {
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <div class="error-404">
    <div class="error-404-content">
      <div class="error-404-code">404</div>
      <h1 class="error-404-title">Sayfa Bulunamadı</h1>
      <p class="error-404-text">
        Üzgünüz, aradığınız sayfa bulunamadı. Sayfa taşınmış, silinmiş 
        veya hiç var olmamış olabilir.
      </p>
      
      <div class="error-404-links">
        <a href="/" class="error-404-link">Ana Sayfaya Dön</a>
        <a href="/products.html" class="error-404-link secondary">Ürünleri İncele</a>
      </div>
      
      <!-- Popüler Ürünler (SEO için internal linking) -->
      <div class="popular-products">
        <h3>Popüler Ürünlerimiz</h3>
        <div class="popular-products-grid" id="popularProducts">
          <!-- JavaScript ile yüklenecek -->
          <p style="grid-column: 1/-1; color: #999;">Yükleniyor...</p>
        </div>
      </div>
      
      <!-- Arama Formu (Opsiyonel) -->
      <div style="margin-top: 2rem;">
        <form action="/products.html" method="get" style="display: flex; gap: 0.5rem; max-width: 400px; margin: 0 auto;">
          <input 
            type="text" 
            name="search" 
            placeholder="Ürün ara..." 
            style="flex: 1; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px;"
          >
          <button 
            type="submit" 
            style="padding: 0.75rem 1.5rem; background: var(--color-accent); color: white; border: none; border-radius: 4px; cursor: pointer;"
          >
            Ara
          </button>
        </form>
      </div>
    </div>
  </div>
  
  <script src="/js/config.js"></script>
  <script src="/js/api.js"></script>
  <script>
    // Popüler ürünleri yükle (internal linking için)
    async function loadPopularProducts() {
      try {
        const response = await api.getProducts({ 
          featured: 'true', 
          limit: 4 
        });
        
        const container = document.getElementById('popularProducts');
        
        if (response.products && response.products.length > 0) {
          container.innerHTML = response.products.map(product => `
            <div class="popular-product-item">
              <a href="/product.html?id=${product.id}">
                <img 
                  src="${product.primary_image || '/images/placeholder.jpg'}" 
                  alt="${product.name}"
                  loading="lazy"
                >
                <div>${product.name}</div>
              </a>
            </div>
          `).join('');
        } else {
          container.innerHTML = '<p style="grid-column: 1/-1;">Ürün bulunamadı</p>';
        }
      } catch (error) {
        console.error('Popular products error:', error);
        document.getElementById('popularProducts').innerHTML = '';
      }
    }
    
    // Sayfa yüklendiğinde popüler ürünleri getir
    document.addEventListener('DOMContentLoaded', loadPopularProducts);
  </script>
</body>
</html>
