<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kategori - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* Hero Section - Products ile aynı stil */
      .category-hero {
        text-align: center;
        padding: 150px 0 60px;
        background: linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
      }

      .category-hero h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 3rem;
        font-weight: 300;
        font-style: italic;
        margin-bottom: 1rem;
        color: var(--text-primary);
      }

      .category-hero p {
        font-size: 1.125rem;
        color: var(--text-secondary);
        max-width: 600px;
        margin: 0 auto;
      }

      .category-products {
        padding: 4rem 0;
        background: var(--color-white);
      }

      .products-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 3rem;
      }

      .products-count {
        font-size: 0.9375rem;
        color: var(--color-text-light);
      }

      .sort-select {
        padding: 0.5rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 4px;
        font-size: 0.9375rem;
        background: white;
        cursor: pointer;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        grid-column: 1/-1;
      }

      .empty-state h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <div id="header-container"></div>

    <!-- Hero -->
    <section class="category-hero">
      <div class="container">
        <h1 id="categoryTitle">Yükleniyor...</h1>
        <p id="categoryDescription"></p>
      </div>
    </section>

    <!-- Products -->
    <section class="category-products">
      <div class="container">
        <div class="products-header">
          <div class="products-count" id="productsCount">Yükleniyor...</div>

          <select class="sort-select" id="sortSelect">
            <option value="newest">En Yeni</option>
            <option value="price-asc">Fiyat: Düşükten Yükseğe</option>
            <option value="price-desc">Fiyat: Yüksekten Düşüğe</option>
            <option value="name">İsme Göre</option>
          </select>
        </div>

        <div class="products-grid" id="productsGrid">
          <!-- Will be populated by JS -->
          <div style="grid-column: 1/-1; text-align: center; padding: 4rem">
            <div class="loading-spinner" style="margin: 0 auto"></div>
            <p style="margin-top: 1rem">Yükleniyor...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
      let categorySlug = "";
      let categoryData = null;
      let products = [];

      document.addEventListener("DOMContentLoaded", async () => {
        categorySlug = getQueryParam("cat");

        if (!categorySlug) {
          window.location.href = "/products.html";
          return;
        }

        await loadCategory();
        initSort();
      });

      async function loadCategory() {
        try {
          categoryData = await api.getCategory(categorySlug);

          document.getElementById("categoryTitle").textContent =
            categoryData.category.name;
          document.getElementById("categoryDescription").textContent =
            categoryData.category.description || "";

          products = categoryData.products || [];
          renderProducts(products);
        } catch (error) {
          console.error("Load category error:", error);
          document.getElementById("categoryTitle").textContent =
            "Kategori Bulunamadı";
          document.getElementById("categoryDescription").textContent = "";
          document.getElementById("productsGrid").innerHTML = `
                    <div class="empty-state">
                        <h3>Kategori Bulunamadı</h3>
                        <p>Aradığınız kategori mevcut değil.</p>
                        <a href="/products.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Tüm Ürünler</a>
                    </div>
                `;
        }
      }

      function initSort() {
        document
          .getElementById("sortSelect")
          .addEventListener("change", (e) => {
            const sorted = sortProducts(products, e.target.value);
            renderProducts(sorted);
          });
      }

      function sortProducts(products, sortType) {
        const sorted = [...products];

        switch (sortType) {
          case "newest":
            return sorted.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
          case "price-asc":
            return sorted.sort(
              (a, b) =>
                (a.discount_price || a.price) - (b.discount_price || b.price)
            );
          case "price-desc":
            return sorted.sort(
              (a, b) =>
                (b.discount_price || b.price) - (a.discount_price || a.price)
            );
          case "name":
            return sorted.sort((a, b) => a.name.localeCompare(b.name, "tr"));
          default:
            return sorted;
        }
      }

      function renderProducts(products) {
        const grid = document.getElementById("productsGrid");
        const count = document.getElementById("productsCount");

        count.textContent = `${products.length} ürün`;

        if (products.length === 0) {
          grid.innerHTML = `
                    <div class="empty-state">
                        <h3>Bu Kategoride Ürün Yok</h3>
                        <p>Henüz bu kategoriye ürün eklenmemiş.</p>
                    </div>
                `;
          return;
        }

        grid.innerHTML = products
          .map((product) => renderProductCard(product))
          .join("");
      }

      function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
      }
    </script>
  </body>
</html>
