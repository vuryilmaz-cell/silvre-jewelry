<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Favorilerim - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .favorites-container {
            margin-top: 120px;
            margin-bottom: 4rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-header h1 {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 300;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-secondary);
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }

        .favorite-card {
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .favorite-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-4px);
        }

        .favorite-image-container {
            position: relative;
            width: 100%;
            padding-top: 100%;
            overflow: hidden;
            background: var(--color-light-grey);
        }

        .favorite-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .favorite-actions {
            position: absolute;
            top: 1rem;
            right: 1rem;
            display: flex;
            gap: 0.5rem;
        }

        .action-btn {
            width: 36px;
            height: 36px;
            background: white;
            border: none;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: var(--color-charcoal);
            transform: scale(1.1);
        }

        .action-btn:hover svg {
            stroke: white;
        }

        .action-btn svg {
            width: 18px;
            height: 18px;
        }

        .favorite-content {
            padding: 1.25rem;
        }

        .favorite-category {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .favorite-name {
            font-size: 1.125rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .favorite-price {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .price-current {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .price-original {
            font-size: 1rem;
            color: var(--text-secondary);
            text-decoration: line-through;
        }

        .favorite-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.875rem;
            color: var(--text-secondary);
            padding-top: 1rem;
            border-top: 1px solid var(--color-border);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
        }

        .btn-add-to-cart {
            width: 100%;
            padding: 0.75rem;
            background: var(--color-charcoal);
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.5rem;
        }

        .btn-add-to-cart:hover {
            background: var(--color-off-black);
            transform: translateY(-2px);
        }

        .btn-add-to-cart:disabled {
            background: var(--color-border);
            cursor: not-allowed;
            transform: none;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--color-white);
            border: 1px solid var(--color-border);
            border-radius: 8px;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            color: var(--color-silver);
        }

        .empty-state h3 {
            font-family: var(--font-heading);
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        @media (max-width: 768px) {
            .favorites-grid {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .favorites-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <div id="header-container"></div>

    <!-- Favorites Container -->
    <section class="container favorites-container">
        <div class="page-header">
            <h1>Favorilerim</h1>
            <p>Beğendiğiniz ürünleri saklayın</p>
        </div>

        <div id="favoritesContainer">
            <!-- Favorites will be loaded here -->
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
                <h3>Yükleniyor...</h3>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // Auth check
            if (!auth.isAuthenticated()) {
                window.location.href = '/login.html?redirect=/favorites.html';
                return;
            }

            await loadFavorites();
        });

        async function loadFavorites() {
            try {
                const data = await api.getFavorites();
                const favorites = data.favorites || [];

                const container = document.getElementById('favoritesContainer');

                if (favorites.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <h3>Henüz favori ürününüz yok</h3>
                            <p>Beğendiğiniz ürünleri favorilere ekleyerek daha sonra kolayca bulabilirsiniz</p>
                            <a href="/products.html" class="btn btn-primary">Ürünleri Keşfet</a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="favorites-grid">
                        ${favorites.map(product => renderFavoriteCard(product)).join('')}
                    </div>
                `;

            } catch (error) {
                console.error('Load favorites error:', error);
                document.getElementById('favoritesContainer').innerHTML = `
                    <div class="empty-state">
                        <h3>Favoriler yüklenemedi</h3>
                        <p>${error.message || 'Bir hata oluştu'}</p>
                        <button onclick="loadFavorites()" class="btn btn-primary">Tekrar Dene</button>
                    </div>
                `;
            }
        }

        function renderFavoriteCard(product) {
            const imageUrl = product.primary_image 
                ? `${API_CONFIG.API_URL}${product.primary_image}` 
                : '/images/placeholder.jpg';

            const currentPrice = product.discount_price || product.price;
            const hasDiscount = product.discount_price && product.discount_price < product.price;

            return `
                <div class="favorite-card">
                    <div class="favorite-image-container">
                        <img src="${imageUrl}" alt="${product.name}" class="favorite-image" onerror="this.src='/images/placeholder.jpg'">
                        
                        <div class="favorite-actions">
                            <button class="action-btn" onclick="removeFromFavorites(${product.id})" title="Favorilerden Çıkar">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="favorite-content">
                        ${product.category_name ? `
                            <div class="favorite-category">${product.category_name}</div>
                        ` : ''}
                        
                        <a href="/product.html?id=${product.id}" class="favorite-name">
                            ${product.name}
                        </a>

                        <div class="favorite-price">
                            <span class="price-current">${formatPrice(currentPrice)}</span>
                            ${hasDiscount ? `
                                <span class="price-original">${formatPrice(product.price)}</span>
                            ` : ''}
                        </div>

                        ${product.stock_quantity > 0 ? `
                            <button class="btn-add-to-cart" onclick="addToCartFromFavorites(${product.id})">
                                Sepete Ekle
                            </button>
                        ` : `
                            <button class="btn-add-to-cart" disabled>
                                Stokta Yok
                            </button>
                        `}

                        <div class="favorite-meta">
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/>
                                </svg>
                                <span>${product.avg_rating ? product.avg_rating.toFixed(1) : '-'}</span>
                            </div>
                            <div class="meta-item">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <span>${product.views || 0}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        async function removeFromFavorites(productId) {
            if (!confirm('Bu ürünü favorilerden çıkarmak istediğinizden emin misiniz?')) {
                return;
            }

            try {
                await api.removeFromFavorites(productId);
                showToast('Favorilerden çıkarıldı', 'success');
                
                // Reload favorites
                await loadFavorites();

                // Update favorites count in header
                updateFavoritesCount();

            } catch (error) {
                console.error('Remove from favorites error:', error);
                showToast(error.message || 'Bir hata oluştu', 'error');
            }
        }

        async function addToCartFromFavorites(productId) {
            try {
                await api.addToCart(productId, 1);
                showToast('Ürün sepete eklendi', 'success');

                // Update cart count in header
                updateCartCount();

            } catch (error) {
                console.error('Add to cart error:', error);
                showToast(error.message || 'Sepete eklenemedi', 'error');
            }
        }

        function updateFavoritesCount() {
            // Update favorites badge in header if it exists
            const favBadge = document.querySelector('.favorites-count');
            if (favBadge) {
                const count = favoritesHelper.getCount();
                favBadge.textContent = count;
                favBadge.style.display = count > 0 ? 'flex' : 'none';
            }
        }

        function updateCartCount() {
            // Update cart badge in header if it exists
            const cartBadge = document.querySelector('.cart-count');
            if (cartBadge) {
                const count = cartHelper.getCount();
                cartBadge.textContent = count;
                cartBadge.style.display = count > 0 ? 'flex' : 'none';
            }
        }
    </script>
</body>
</html>
