<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Giriş Yap - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .auth-container {
        max-width: 1000px;
        width: 100%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .auth-side {
        padding: 3rem;
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .auth-side-logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 3rem;
        font-weight: 300;
        letter-spacing: 0.2em;
        margin-bottom: 1rem;
      }

      .auth-side-text {
        font-size: 1.125rem;
        line-height: 1.8;
        opacity: 0.9;
        margin-bottom: 2rem;
      }

      .auth-side-features {
        list-style: none;
      }

      .auth-side-features li {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
        font-size: 0.9375rem;
        opacity: 0.8;
      }

      .auth-side-features svg {
        flex-shrink: 0;
      }

      .auth-form-container {
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .auth-header {
        margin-bottom: 2rem;
      }

      .auth-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 400;
        margin-bottom: 0.5rem;
        color: #2a2a2a;
      }

      .auth-subtitle {
        color: #666;
        font-size: 0.9375rem;
      }

      .auth-subtitle a {
        color: #8b7355;
        text-decoration: none;
        font-weight: 500;
      }

      .auth-subtitle a:hover {
        text-decoration: underline;
      }

      .form-group {
        margin-bottom: 1.5rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-family: inherit;
        transition: all 0.3s;
      }

      .form-input:focus {
        outline: none;
        border-color: #8b7355;
        box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
      }

      .form-checkbox {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: #666;
      }

      .form-checkbox input {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 0.875rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        display: none;
      }

      .error-message.show {
        display: block;
      }

      .btn-submit {
        width: 100%;
        padding: 1rem;
        background: #2a2a2a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 1rem;
      }

      .btn-submit:hover {
        background: #8b7355;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(139, 115, 85, 0.3);
      }

      .btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
        color: #999;
        font-size: 0.875rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }

      .divider::before {
        margin-right: 1rem;
      }

      .divider::after {
        margin-left: 1rem;
      }

      .back-home {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-home a {
        color: #666;
        text-decoration: none;
        font-size: 0.875rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.3s;
      }

      .back-home a:hover {
        color: #8b7355;
      }

      @media (max-width: 768px) {
        .auth-container {
          grid-template-columns: 1fr;
        }

        .auth-side {
          display: none;
        }

        .auth-form-container {
          padding: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- Left Side -->
      <div class="auth-side">
        <div class="auth-side-logo">SILVRE</div>
        <p class="auth-side-text">
          El yapımı, minimal tasarım 925 ayar gümüş takılarla zarafeti
          yakalayın.
        </p>

        <ul class="auth-side-features">
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Özel Tasarımlar
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Ücretsiz Kargo (500 TL üzeri)
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            14 Gün İade Garantisi
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Güvenli Ödeme
          </li>
        </ul>
      </div>

      <!-- Right Side - Login Form -->
      <div class="auth-form-container">
        <div class="auth-header">
          <h1 class="auth-title">Hoş Geldiniz</h1>
          <p class="auth-subtitle">
            Hesabınız yok mu? <a href="/register.html">Kayıt Olun</a>
          </p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
          <div class="form-group">
            <label class="form-label" for="email">E-posta</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="ornek@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Şifre</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
          </div>

          <button type="submit" class="btn-submit" id="loginBtn">
            Giriş Yap
          </button>
        </form>
    </form>

    <div class="back-home">
      <a href="/">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path d="M19 12H5M12 19l-7-7 7-7" />
        </svg>
        Ana Sayfaya Dön
      </a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script>
  const loginForm = document.getElementById('loginForm');
  const loginBtn = document.getElementById('loginBtn');
  const errorMessage = document.getElementById('errorMessage');
  
  // Check if already logged in
  if (auth.isAuthenticated()) {
    const redirect = getRedirectUrl();
    window.location.href = redirect || '/';
  }
  
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    
    loginBtn.disabled = true;
    loginBtn.textContent = 'Giriş yapılıyor...';
    errorMessage.classList.remove('show');
    
    try {
      await api.login(email, password);
      
      showSuccessMessage('Giriş başarılı! Yönlendiriliyorsunuz...');
      
      // Redirect
      const redirect = getRedirectUrl();
      setTimeout(() => {
        window.location.href = redirect || '/';
      }, 1000);
      
    } catch (error) {
      console.error('Login error:', error);
      errorMessage.textContent = error.message || 'Giriş başarısız. Lütfen bilgilerinizi kontrol edin.';
      errorMessage.classList.add('show');
      
      loginBtn.disabled = false;
      loginBtn.textContent = 'Giriş Yap';
    }
  });
  
  function getRedirectUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('redirect');
  }
  
  function getQueryParam(param) {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
  }
  
  function showSuccessMessage(message) {
    errorMessage.textContent = message;
    errorMessage.style.background = '#E8F5E9';
    errorMessage.style.color = '#2E7D32';
    errorMessage.classList.add('show');
  }
</script>
</body>
</html>
