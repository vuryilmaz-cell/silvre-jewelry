<style>
  .user-menu {

  }

  .user-dropdown {
    position: relative;
  }

  .user-dropdown-toggle {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
  }

  .dropdown-menu {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 1rem;
    background: var(--color-white);
    border: 1px solid var(--color-border);
    border-radius: 8px;
    box-shadow: var(--shadow-lg);
    min-width: 200px;
    opacity: 0;
    visibility: hidden;
    transform: translateY(-10px);
    transition: all 0.3s ease;
    z-index: 1000;
  }

  .dropdown-menu.show {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }

  .dropdown-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--color-border);
    font-weight: 500;
    color: var(--text-primary);
    font-size: 0.9375rem;
  }

  .dropdown-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1.25rem;
    color: var(--text-secondary);
    font-size: 0.9375rem;
    transition: all 0.2s;
    border: none;
    background: none;
    width: 100%;
    text-align: left;
    cursor: pointer;
  }

  .dropdown-item:hover {
    background: var(--color-light-grey);
    color: var(--text-primary);
  }

  .dropdown-item svg {
    color: var(--text-secondary);
  }

  .logout-btn {
    border-top: 1px solid var(--color-border);
    color: #f44336;
  }

  .logout-btn:hover {
    background: #ffebee;
    color: #c62828;
  }

  .logout-btn svg {
    color: #f44336;
  }
  
  /* Mobile Menu Button - Desktop'ta da göster */
  .mobile-menu-btn {
    display: block; /* Her zaman göster */
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    color: var(--color-white);
    transition: all 0.3s;
  }

    transform: scale(1.1);

<script>
  // Auth state management - Immediately Invoked
  (function () {
    function init() {
      updateAuthUI();
      initUserDropdown();
      initLogout();
      initMobileMenu();
    }

    // Run immediately when script loads
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      // DOM already loaded
      init();
    }

    function updateAuthUI() {
      // Get user from localStorage directly
      const userStr = localStorage.getItem("silvre_user");
      const user = userStr ? JSON.parse(userStr) : null;

      const loginIcon = document.getElementById("loginIcon");
      const userDropdown = document.getElementById("userDropdown");

      console.log("Auth UI Update:", { user, loginIcon, userDropdown }); // Debug

      if (!loginIcon || !userDropdown) {
        console.warn("Header elements not found, retrying...");
        setTimeout(updateAuthUI, 100);
        return;
      }

      if (user) {
        // User logged in - show dropdown
        loginIcon.style.display = "none";
        userDropdown.style.display = "block";

        // Update user name
        const userName = user.full_name || user.email.split("@")[0];
        const userNameDisplay = document.getElementById("userNameDisplay");
        if (userNameDisplay) {
          userNameDisplay.textContent = userName;
        }

        console.log("User logged in:", userName); // Debug
      } else {
        // User not logged in - show login icon
        loginIcon.style.display = "block";
        userDropdown.style.display = "none";

        console.log("No user logged in"); // Debug
      }
    }

    function initUserDropdown() {
      const toggle = document.getElementById("userDropdownToggle");
      const menu = document.getElementById("dropdownMenu");

      if (!toggle || !menu) {
        console.warn("Dropdown elements not found");
        return;
      }

      toggle.addEventListener("click", (e) => {
        e.stopPropagation();
        console.log("Toggle clicked, menu:", menu.classList); // Debug
        menu.classList.toggle("show");
      });

      // Close on outside click
      document.addEventListener("click", (e) => {
        if (!menu.contains(e.target) && !toggle.contains(e.target)) {
          menu.classList.remove("show");
        }
      });

      console.log("Dropdown initialized"); // Debug
    }

    function initLogout() {
      const logoutBtn = document.getElementById("logoutBtn");

      if (!logoutBtn) {
        console.warn("Logout button not found");
        return;
      }

      logoutBtn.addEventListener("click", () => {
        console.log("Logout clicked"); // Debug

        // Clear localStorage
        localStorage.removeItem("silvre_auth_token");
        localStorage.removeItem("silvre_user");

        // Show success message
        const toastContainer = document.getElementById("toastContainer");
        if (toastContainer) {
          const toast = document.createElement("div");
          toast.className = "toast success";
          toast.textContent = "Çıkış yapıldı";
          toastContainer.appendChild(toast);
          setTimeout(() => toast.remove(), 3000);
        }

        // Redirect to home
        setTimeout(() => {
          window.location.href = "/";
        }, 500);
      });

      console.log("Logout initialized"); // Debug
    }
    
    function initMobileMenu() {
      // Retry mechanism - wait for elements
      setTimeout(() => {
        const mobileMenuBtn = document.getElementById("mobileMenuBtn");
        const navMenu = document.getElementById("navMenu");
        const navOverlay = document.getElementById("navOverlay");
        const navMenuClose = document.getElementById("navMenuClose");
        
        if (!mobileMenuBtn || !navMenu) {
          console.warn("Mobile menu elements not found, retrying...");
          initMobileMenu();
          return;
        }
        
        console.log("Mobile menu elements found:", mobileMenuBtn, navMenu);
        
        // Open menu
        mobileMenuBtn.onclick = function(e) {
          e.stopPropagation();
          navMenu.classList.add("active");
          if (navOverlay) navOverlay.classList.add("active");
          document.body.style.overflow = "hidden"; // Prevent scroll
          console.log("Mobile menu opened");
        };
        
        // Close menu - X button
        if (navMenuClose) {
          navMenuClose.onclick = function(e) {
            e.stopPropagation();
            closeMenu();
          };
        }
        
        // Close menu - Overlay click
        if (navOverlay) {
          navOverlay.onclick = function() {
            closeMenu();
          };
        }
        
        // Close menu - Link click
        navMenu.querySelectorAll(".nav-link").forEach(link => {
          link.addEventListener("click", () => {
            closeMenu();
          });
        });
        
        function closeMenu() {
          navMenu.classList.remove("active");
          if (navOverlay) navOverlay.classList.remove("active");
          document.body.style.overflow = ""; // Restore scroll
          console.log("Mobile menu closed");
        }
        
        // Close on ESC key
        document.addEventListener("keydown", (e) => {
          if (e.key === "Escape" && navMenu.classList.contains("active")) {
            closeMenu();
          }
        });
        
        console.log("Mobile menu initialized successfully");
      }, 200);
    }
    
    // Re-init mobile menu after categories are loaded
    window.reinitMobileMenu = initMobileMenu;
  })();
</script>
