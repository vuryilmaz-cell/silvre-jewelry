<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ürün Detayı - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .product-detail {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4rem;
        margin-top: 120px;
        margin-bottom: 4rem;
      }

      .product-gallery {
        position: sticky;
        top: 100px;
        align-self: start;
      }

      .main-image {
        width: 500px;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 1rem;
        background: #f8f8f8;
      }

      .thumbnail-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }

      .thumbnail {
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 4px;
        cursor: pointer;
        border: 2px solid transparent;
        transition: all 0.3s;
        background: #f8f8f8;
      }

      .thumbnail:hover,
      .thumbnail.active {
        border-color: var(--color-accent);
      }

      .product-info {
        padding-top: 1rem;
      }

      .breadcrumb {
        font-size: 0.875rem;
        color: var(--color-dark-silver);
        margin-bottom: 1.5rem;
      }

      .breadcrumb a {
        color: var(--color-dark-silver);
        text-decoration: none;
      }

      .breadcrumb a:hover {
        color: var(--color-accent);
      }

      .product-title {
        font-size: 2.5rem;
        font-weight: 300;
        font-style: italic;
        margin-bottom: 1rem;
        color: var(--color-off-black);
      }

      .product-price-box {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--color-border);
      }

      .current-price {
        font-size: 2rem;
        font-weight: 400;
        color: var(--color-accent);
      }

      .original-price {
        font-size: 1.5rem;
        color: var(--color-dark-silver);
        text-decoration: line-through;
      }

      .discount-badge {
        background: var(--color-accent);
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: 12px;
        font-size: 0.875rem;
        font-weight: 500;
      }

      .product-meta {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--color-border);
      }

      .meta-item {
        display: flex;
        justify-content: space-between;
        padding: 0.75rem 0;
        font-size: 0.9375rem;
      }

      .meta-label {
        color: var(--color-text-light);
      }

      .meta-value {
        font-weight: 400;
        color: var(--color-off-black);
      }

      .stock-status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .stock-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #4caf50;
      }

      .stock-dot.out {
        background: #f44336;
      }

      .product-description {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--color-border);
        line-height: 1.8;
        color: var(--color-text);
      }

      .quantity-selector {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      .quantity-label {
        font-weight: 500;
      }

      .quantity-controls {
        display: flex;
        align-items: center;
        border: 1px solid var(--color-border);
        border-radius: 4px;
        overflow: hidden;
      }

      .quantity-btn {
        width: 40px;
        height: 40px;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 1.25rem;
        transition: background 0.2s;
      }

      .quantity-btn:hover {
        background: var(--color-bg);
      }

      .quantity-input {
        width: 60px;
        height: 40px;
        border: none;
        text-align: center;
        font-size: 1rem;
        border-left: 1px solid var(--color-border);
        border-right: 1px solid var(--color-border);
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
        margin-bottom: 2rem;
      }

      .btn-add-cart {
        flex: 1;
        padding: 1.25rem;
        background: var(--color-off-black);
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 0.9375rem;
        font-weight: 500;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.3s;
      }

      .btn-add-cart:hover {
        background: var(--color-accent);
      }

      .btn-add-cart:disabled {
        background: var(--color-dark-silver);
        cursor: not-allowed;
      }

      .btn-favorite {
        width: 60px;
        height: 60px;
        border: 1px solid var(--color-border);
        background: white;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.3s;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .btn-favorite:hover {
        border-color: var(--color-accent);
        background: var(--color-cream);
      }

      .btn-favorite.active {
        border-color: var(--color-accent);
        background: var(--color-accent);
        color: white;
      }

      .features-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-bottom: 3rem;
      }

      .feature-item {
        text-align: center;
        padding: 1.5rem;
        background: var(--color-cream);
        border-radius: 8px;
      }

      .feature-icon {
        margin-bottom: 1rem;
      }

      .feature-title {
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
      }

      .feature-desc {
        font-size: 0.8125rem;
        color: var(--color-text-light);
      }

      @media (max-width: 768px) {
        .product-detail {
          grid-template-columns: 1fr;
          gap: 2rem;
          margin-top: 80px;
        }

        .product-gallery {
          position: static;
        }

        .features-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <div id="header-container"></div>

    <!-- Product Detail -->
    <section class="container">
      <div class="product-detail" id="productDetail">
        <div style="text-align: center; padding: 4rem; grid-column: 1/-1">
          <div class="loading-spinner" style="margin: 0 auto"></div>
          <p style="margin-top: 1rem">Yükleniyor...</p>
        </div>
      </div>
    </section>

    <!-- Features -->
    <section class="container">
      <div class="features-grid">
        <div class="feature-item">
          <div class="feature-icon">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M20 7h-4m0 10v-4m-8 4H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-4"
              />
            </svg>
          </div>
          <div class="feature-title">Ücretsiz Kargo</div>
          <div class="feature-desc">500 TL üzeri siparişlerde</div>
        </div>

        <div class="feature-item">
          <div class="feature-icon">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
          </div>
          <div class="feature-title">Güvenli Alışveriş</div>
          <div class="feature-desc">SSL sertifikası ile korumalı</div>
        </div>

        <div class="feature-item">
          <div class="feature-icon">
            <svg
              width="32"
              height="32"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
            >
              <path
                d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
              />
            </svg>
          </div>
          <div class="feature-title">Kolay İade</div>
          <div class="feature-desc">14 gün içinde ücretsiz</div>
        </div>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
      let currentProduct = null;
      let currentQuantity = 1;

      document.addEventListener("DOMContentLoaded", async () => {
        const productId = getQueryParam("id");

        if (!productId) {
          window.location.href = "/products.html";
          return;
        }

        await loadProduct(productId);
      });

      async function loadProduct(id) {
        try {
          currentProduct = await api.getProduct(id);
          renderProduct(currentProduct);
        } catch (error) {
          console.error("Load product error:", error);
          document.getElementById("productDetail").innerHTML = `
                    <div style="text-align: center; padding: 4rem; grid-column: 1/-1;">
                        <p style="color: red;">Ürün yüklenirken hata oluştu.</p>
                        <a href="/products.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Ürünlere Dön</a>
                    </div>
                `;
        }
      }

      function renderProduct(product) {
        const price = product.discount_price || product.price;
        const hasDiscount =
          product.discount_price && product.discount_price < product.price;
        const discountPercent = hasDiscount
          ? Math.round(
              ((product.price - product.discount_price) / product.price) * 100
            )
          : 0;
        const inStock = product.stock_quantity > 0;

        // Build images array
        const images =
          product.images && product.images.length > 0
            ? product.images.map(
                (img) => `http://localhost:5000${img.image_url}`
              )
            : product.primary_image
            ? [`http://localhost:5000${product.primary_image}`]
            : ["/images/placeholder.jpg"];

        const mainImage = images[0];

        document.getElementById("productDetail").innerHTML = `
                <!-- Gallery -->
                <div class="product-gallery">
                    <img src="${mainImage}" alt="${
          product.name
        }" class="main-image" id="mainImage">
                    ${
                      images.length > 1
                        ? `
                        <div class="thumbnail-grid">
                            ${images
                              .map(
                                (img, index) => `
                                <img src="${img}" 
                                     alt="${product.name}" 
                                     class="thumbnail ${
                                       index === 0 ? "active" : ""
                                     }" 
                                     onclick="changeMainImage('${img}', event)">
                            `
                              )
                              .join("")}
                        </div>
                    `
                        : ""
                    }
                </div>
                
                <!-- Info -->
                <div class="product-info">
                    <div class="breadcrumb">
                        <a href="/">Ana Sayfa</a> / 
                        <a href="/categories.html?cat=${
                          product.category_slug
                        }">${product.category_name}</a> / 
                        ${product.name}
                    </div>
                    
                    <h1 class="product-title">${product.name}</h1>
                    
                    <div class="product-price-box">
                        <span class="current-price">${formatPrice(price)}</span>
                        ${
                          hasDiscount
                            ? `
                            <span class="original-price">${formatPrice(
                              product.price
                            )}</span>
                            <span class="discount-badge">%${discountPercent} İndirim</span>
                        `
                            : ""
                        }
                    </div>
                    
                    <div class="product-meta">
                        <div class="meta-item">
                            <span class="meta-label">Durum</span>
                            <span class="meta-value stock-status">
                                <span class="stock-dot ${
                                  !inStock ? "out" : ""
                                }"></span>
                                ${inStock ? "Stokta Var" : "Tükendi"}
                            </span>
                        </div>
                        <div class="meta-item">
                            <span class="meta-label">Malzeme</span>
                            <span class="meta-value">${
                              product.material || "925 Ayar Gümüş"
                            }</span>
                        </div>
                        ${
                          product.sku
                            ? `
                            <div class="meta-item">
                                <span class="meta-label">Ürün Kodu</span>
                                <span class="meta-value">${product.sku}</span>
                            </div>
                        `
                            : ""
                        }
                        ${
                          product.weight
                            ? `
                            <div class="meta-item">
                                <span class="meta-label">Ağırlık</span>
                                <span class="meta-value">${product.weight}g</span>
                            </div>
                        `
                            : ""
                        }
                    </div>
                    
                    ${
                      product.description
                        ? `
                        <div class="product-description">
                            ${product.description}
                        </div>
                    `
                        : ""
                    }
                    
                    ${
                      inStock
                        ? `
                        <div class="quantity-selector">
                            <span class="quantity-label">Adet:</span>
                            <div class="quantity-controls">
                                <button class="quantity-btn" onclick="changeQuantity(-1)">−</button>
                                <input type="number" class="quantity-input" id="quantityInput" value="1" min="1" max="${
                                  product.stock_quantity
                                }" readonly>
                                <button class="quantity-btn" onclick="changeQuantity(1)">+</button>
                            </div>
                        </div>
                        
                        <div class="action-buttons">
                            <button class="btn-add-cart" onclick="addToCart()">
                                Sepete Ekle
                            </button>
                            <button class="btn-favorite ${
                              product.is_favorite ? "active" : ""
                            }" onclick="toggleFavorite(${
                            product.id
                          })" id="favoriteBtn">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="${
                                  product.is_favorite ? "currentColor" : "none"
                                }" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </button>
                        </div>
                    `
                        : `
                        <button class="btn-add-cart" disabled>
                            Stokta Yok
                        </button>
                    `
                    }
                </div>
            `;
      }

      function changeMainImage(src, event) {
        document.getElementById("mainImage").src = src;

        // Update active thumbnail
        document
          .querySelectorAll(".thumbnail")
          .forEach((thumb) => thumb.classList.remove("active"));
        event.target.classList.add("active");
      }

      function changeQuantity(delta) {
        const input = document.getElementById("quantityInput");
        const newValue = currentQuantity + delta;
        const max = parseInt(input.max);

        if (newValue >= 1 && newValue <= max) {
          currentQuantity = newValue;
          input.value = currentQuantity;
        }
      }

      async function addToCart() {
        if (!currentProduct) return;

        try {
          await addToCartHandler(currentProduct.id, currentQuantity);

          // Reset quantity
          currentQuantity = 1;
          document.getElementById("quantityInput").value = 1;
        } catch (error) {
          console.error("Add to cart error:", error);
        }
      }

      async function toggleFavorite(productId) {
        if (!auth.isAuthenticated()) {
          showToast("Favorilere eklemek için giriş yapmalısınız", "error");
          setTimeout(() => {
            window.location.href = `/login.html?redirect=${encodeURIComponent(
              window.location.pathname
            )}`;
          }, 1500);
          return;
        }

        try {
          const btn = document.getElementById("favoriteBtn");
          const isCurrentlyFavorite = btn.classList.contains("active");

          if (isCurrentlyFavorite) {
            // Remove from favorites
            await api.removeFromFavorites(productId);
            btn.classList.remove("active");

            // Update SVG fill
            const svg = btn.querySelector("svg");
            svg.setAttribute("fill", "none");

            showToast("Favorilerden çıkarıldı", "success");

            // Update product state
            if (currentProduct) {
              currentProduct.is_favorite = false;
            }
          } else {
            // Add to favorites
            await api.addToFavorites(productId);
            btn.classList.add("active");

            // Update SVG fill
            const svg = btn.querySelector("svg");
            svg.setAttribute("fill", "currentColor");

            showToast("Favorilere eklendi", "success");

            // Update product state
            if (currentProduct) {
              currentProduct.is_favorite = true;
            }
          }

          // Update favorites count in header (if exists)
          updateFavoritesCount();
        } catch (error) {
          console.error("Toggle favorite error:", error);
          showToast(error.message || "Bir hata oluştu", "error");
        }
      }

      function updateFavoritesCount() {
        // Update favorites badge in header if it exists
        const favBadge = document.querySelector(".favorites-count");
        if (favBadge) {
          const count = favoritesHelper.getCount();
          favBadge.textContent = count;
          favBadge.style.display = count > 0 ? "flex" : "none";
        }
      }
    </script>
  </body>
</html>
