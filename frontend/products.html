<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tüm Ürünler - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .products-hero {
        text-align: center;
        padding: 150px 0 60px;
        background: linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
      }

      .products-hero h1 {
        font-family: "Cormorant Garamond", serif;
        font-size: 3rem;
        font-weight: 300;
        font-style: italic;
        margin-bottom: 1rem;
      }

      .products-hero p {
        font-size: 1.125rem;
        color: var(--color-text-light);
      }

      .products-container {
        display: grid;
        grid-template-columns: 250px 1fr;
        gap: 3rem;
        margin-top: 3rem;
        margin-bottom: 4rem;
      }

      .filters-sidebar {
        position: sticky;
        top: 100px;
        align-self: start;
      }

      .filter-section {
        margin-bottom: 2rem;
        padding-bottom: 2rem;
        border-bottom: 1px solid var(--color-border);
      }

      .filter-section:last-child {
        border-bottom: none;
      }

      .filter-title {
        font-size: 1.125rem;
        font-weight: 500;
        margin-bottom: 1rem;
      }

      .filter-option {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 0;
        cursor: pointer;
        font-size: 0.9375rem;
        color: var(--color-text);
        transition: color 0.2s;
      }

      .filter-option:hover {
        color: var(--color-accent);
      }

      .filter-option input[type="checkbox"] {
        width: 18px;
        height: 18px;
        cursor: pointer;
      }

      .products-main {
        min-height: 400px;
      }

      .products-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }

      .products-count {
        font-size: 0.9375rem;
        color: var(--color-text-light);
      }

      .products-sort {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .sort-select {
        padding: 0.5rem 1rem;
        border: 1px solid var(--color-border);
        border-radius: 4px;
        font-size: 0.9375rem;
        background: white;
        cursor: pointer;
      }

      .products-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 2rem;
        grid-column: 1/-1;
      }

      .empty-state h3 {
        font-size: 1.5rem;
        margin-bottom: 0.5rem;
        color: var(--color-off-black);
      }

      .empty-state p {
        color: var(--color-text-light);
      }

      @media (max-width: 968px) {
        .products-container {
          grid-template-columns: 1fr;
        }

        .filters-sidebar {
          position: static;
        }

        .products-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 640px) {
        .products-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <!-- Navigation -->
    <div id="header-container"></div>

    <!-- Hero -->
    <section class="products-hero">
      <div class="container">
        <h1>Stilinizi Tamamlayın</h1>
        <p>
          Stilinize yeni bir yorum getirecek el yapımı gümüş takı koleksiyonumuz
        </p>
      </div>
    </section>

    <!-- Products -->
    <section class="container">
      <div class="products-container">
        <!-- Filters Sidebar -->
        <aside class="filters-sidebar">
          <div class="filter-section">
            <h3 class="filter-title">Cinsiyet</h3>
            <div>
              <label class="filter-option">
                <input type="checkbox" name="gender" value="kadın" />
                Kadın
              </label>
              <label class="filter-option">
                <input type="checkbox" name="gender" value="erkek" />
                Erkek
              </label>
              <label class="filter-option">
                <input type="checkbox" name="gender" value="unisex" />
                Unisex
              </label>
              <label class="filter-option">
                <input type="checkbox" name="gender" value="çocuk" />
                Çocuk
              </label>
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">Kategoriler</h3>
            <div id="categoryFilters">
              <!-- Will be populated by JS -->
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">Fiyat Aralığı</h3>
            <div>
              <label class="filter-option">
                <input type="checkbox" name="price" value="0-250" />
                0 - 250 ₺
              </label>
              <label class="filter-option">
                <input type="checkbox" name="price" value="250-500" />
                250 - 500 ₺
              </label>
              <label class="filter-option">
                <input type="checkbox" name="price" value="500-1000" />
                500 - 1000 ₺
              </label>
              <label class="filter-option">
                <input type="checkbox" name="price" value="1000+" />
                1000 ₺ +
              </label>
            </div>
          </div>

          <div class="filter-section">
            <h3 class="filter-title">Özellikler</h3>
            <div>
              <label class="filter-option">
                <input type="checkbox" name="featured" value="1" />
                Öne Çıkanlar
              </label>
              <label class="filter-option">
                <input type="checkbox" name="discount" value="1" />
                İndirimli Ürünler
              </label>
            </div>
          </div>
        </aside>

        <!-- Products Main -->
        <main class="products-main">
          <div class="products-header">
            <div class="products-count" id="productsCount">Yükleniyor...</div>

            <div class="products-sort">
              <label>Sırala:</label>
              <select class="sort-select" id="sortSelect">
                <option value="newest">En Yeni</option>
                <option value="price-asc">Fiyat: Düşükten Yükseğe</option>
                <option value="price-desc">Fiyat: Yüksekten Düşüğe</option>
                <option value="name">İsme Göre</option>
              </select>
            </div>
          </div>

          <div class="products-grid" id="productsGrid">
            <!-- Will be populated by JS -->
            <div style="grid-column: 1/-1; text-align: center; padding: 4rem">
              <div class="loading-spinner" style="margin: 0 auto"></div>
              <p style="margin-top: 1rem">Yükleniyor...</p>
            </div>
          </div>
        </main>
      </div>
    </section>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
    <script>
      let allProducts = [];
      let categories = [];
      let currentFilters = {
        genders: [],
        categories: [],
        priceRanges: [],
        featured: false,
        discount: false,
      };
      let currentSort = "newest";

      document.addEventListener("DOMContentLoaded", async () => {
        await loadCategories();
        await loadProducts();
        initFilters();
        initSort();
      });

      async function loadCategories() {
        try {
          const data = await api.getCategories();
          categories = data.categories;
          renderCategoryFilters();
        } catch (error) {
          console.error("Load categories error:", error);
        }
      }

      function renderCategoryFilters() {
        const container = document.getElementById("categoryFilters");
        container.innerHTML = categories
          .map(
            (cat) => `
                <label class="filter-option">
                    <input type="checkbox" name="category" value="${cat.id}">
                    ${cat.name}
                </label>
            `
          )
          .join("");
      }

      async function loadProducts() {
        try {
          const data = await api.getProducts({ limit: 100 });
          allProducts = data.products || [];
          applyFilters();
        } catch (error) {
          console.error("Load products error:", error);
          document.getElementById("productsGrid").innerHTML = `
                    <div class="empty-state">
                        <h3>Bir hata oluştu</h3>
                        <p>Ürünler yüklenirken bir sorun oluştu.</p>
                    </div>
                `;
        }
      }

      function initFilters() {
        // Gender filters
        document.querySelectorAll('input[name="gender"]').forEach((input) => {
          input.addEventListener("change", (e) => {
            if (e.target.checked) {
              currentFilters.genders.push(e.target.value);
            } else {
              currentFilters.genders = currentFilters.genders.filter(
                (g) => g !== e.target.value
              );
            }
            applyFilters();
          });
        });

        // Category filters
        document.querySelectorAll('input[name="category"]').forEach((input) => {
          input.addEventListener("change", (e) => {
            if (e.target.checked) {
              currentFilters.categories.push(parseInt(e.target.value));
            } else {
              currentFilters.categories = currentFilters.categories.filter(
                (id) => id !== parseInt(e.target.value)
              );
            }
            applyFilters();
          });
        });

        // Price filters
        document.querySelectorAll('input[name="price"]').forEach((input) => {
          input.addEventListener("change", (e) => {
            if (e.target.checked) {
              currentFilters.priceRanges.push(e.target.value);
            } else {
              currentFilters.priceRanges = currentFilters.priceRanges.filter(
                (r) => r !== e.target.value
              );
            }
            applyFilters();
          });
        });

        // Feature filters
        document
          .querySelector('input[name="featured"]')
          .addEventListener("change", (e) => {
            currentFilters.featured = e.target.checked;
            applyFilters();
          });

        document
          .querySelector('input[name="discount"]')
          .addEventListener("change", (e) => {
            currentFilters.discount = e.target.checked;
            applyFilters();
          });
      }

      function initSort() {
        document
          .getElementById("sortSelect")
          .addEventListener("change", (e) => {
            currentSort = e.target.value;
            applyFilters();
          });
      }

      function applyFilters() {
        let filtered = [...allProducts];

        // Gender filter
        if (currentFilters.genders.length > 0) {
          filtered = filtered.filter((p) =>
            currentFilters.genders.includes(p.gender)
          );
        }

        // Category filter
        if (currentFilters.categories.length > 0) {
          filtered = filtered.filter((p) =>
            currentFilters.categories.includes(p.category_id)
          );
        }

        // Price filter
        if (currentFilters.priceRanges.length > 0) {
          filtered = filtered.filter((p) => {
            const price = p.discount_price || p.price;
            return currentFilters.priceRanges.some((range) => {
              if (range === "0-250") return price <= 250;
              if (range === "250-500") return price > 250 && price <= 500;
              if (range === "500-1000") return price > 500 && price <= 1000;
              if (range === "1000+") return price > 1000;
              return false;
            });
          });
        }

        // Featured filter
        if (currentFilters.featured) {
          filtered = filtered.filter((p) => p.is_featured === 1);
        }

        // Discount filter
        if (currentFilters.discount) {
          filtered = filtered.filter(
            (p) => p.discount_price && p.discount_price < p.price
          );
        }

        // Sort
        filtered = sortProducts(filtered, currentSort);

        // Render
        renderProducts(filtered);
      }

      function sortProducts(products, sortType) {
        const sorted = [...products];

        switch (sortType) {
          case "newest":
            return sorted.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at)
            );
          case "price-asc":
            return sorted.sort(
              (a, b) =>
                (a.discount_price || a.price) - (b.discount_price || b.price)
            );
          case "price-desc":
            return sorted.sort(
              (a, b) =>
                (b.discount_price || b.price) - (a.discount_price || a.price)
            );
          case "name":
            return sorted.sort((a, b) => a.name.localeCompare(b.name, "tr"));
          default:
            return sorted;
        }
      }

      function renderProducts(products) {
        const grid = document.getElementById("productsGrid");
        const count = document.getElementById("productsCount");

        count.textContent = `${products.length} ürün bulundu`;

        if (products.length === 0) {
          grid.innerHTML = `
                    <div class="empty-state">
                        <h3>Ürün Bulunamadı</h3>
                        <p>Seçtiğiniz filtrelere uygun ürün yok. Filtreleri değiştirmeyi deneyin.</p>
                    </div>
                `;
          return;
        }

        grid.innerHTML = products
          .map((product) => renderProductCard(product))
          .join("");
      }
    </script>
  </body>
</html>
