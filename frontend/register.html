<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kayıt Ol - Silvre Jewelry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Montserrat", sans-serif;
        background: linear-gradient(135deg, #faf8f5 0%, #f5f3f0 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
      }

      .auth-container {
        max-width: 1000px;
        width: 100%;
        background: white;
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .auth-side {
        padding: 3rem;
        background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
        color: white;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .auth-side-logo {
        font-family: "Cormorant Garamond", serif;
        font-size: 3rem;
        font-weight: 300;
        letter-spacing: 0.2em;
        margin-bottom: 1rem;
      }

      .auth-side-text {
        font-size: 1.125rem;
        line-height: 1.8;
        opacity: 0.9;
        margin-bottom: 2rem;
      }

      .auth-side-features {
        list-style: none;
      }

      .auth-side-features li {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
        font-size: 0.9375rem;
        opacity: 0.8;
      }

      .auth-side-features svg {
        flex-shrink: 0;
      }

      .auth-form-container {
        padding: 3rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        max-height: 90vh;
        overflow-y: auto;
      }

      .auth-header {
        margin-bottom: 2rem;
      }

      .auth-title {
        font-family: "Cormorant Garamond", serif;
        font-size: 2rem;
        font-weight: 400;
        margin-bottom: 0.5rem;
        color: #2a2a2a;
      }

      .auth-subtitle {
        color: #666;
        font-size: 0.9375rem;
      }

      .auth-subtitle a {
        color: #8b7355;
        text-decoration: none;
        font-weight: 500;
      }

      .auth-subtitle a:hover {
        text-decoration: underline;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #333;
      }

      .form-input {
        width: 100%;
        padding: 0.875rem 1rem;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-family: inherit;
        transition: all 0.3s;
      }

      .form-input:focus {
        outline: none;
        border-color: #8b7355;
        box-shadow: 0 0 0 3px rgba(139, 115, 85, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .form-checkbox {
        display: flex;
        align-items: flex-start;
        gap: 0.5rem;
        font-size: 0.875rem;
        color: #666;
        margin-top: 1rem;
      }

      .form-checkbox input {
        width: 18px;
        height: 18px;
        cursor: pointer;
        margin-top: 2px;
        flex-shrink: 0;
      }

      .form-checkbox label {
        line-height: 1.5;
      }

      .form-checkbox a {
        color: #8b7355;
        text-decoration: none;
      }

      .form-checkbox a:hover {
        text-decoration: underline;
      }

      .error-message,
      .success-message {
        padding: 0.875rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.875rem;
        display: none;
      }

      .error-message {
        background: #ffebee;
        color: #c62828;
      }

      .success-message {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .error-message.show,
      .success-message.show {
        display: block;
      }

      .btn-submit {
        width: 100%;
        padding: 1rem;
        background: #2a2a2a;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 0.9375rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s;
        margin-top: 1rem;
      }

      .btn-submit:hover {
        background: #8b7355;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(139, 115, 85, 0.3);
      }

      .btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
      }

      .back-home {
        text-align: center;
        margin-top: 1.5rem;
      }

      .back-home a {
        color: #666;
        text-decoration: none;
        font-size: 0.875rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: color 0.3s;
      }

      .back-home a:hover {
        color: #8b7355;
      }

      .password-strength {
        margin-top: 0.5rem;
        font-size: 0.75rem;
      }

      .strength-bar {
        height: 4px;
        background: #e0e0e0;
        border-radius: 2px;
        margin-top: 0.25rem;
        overflow: hidden;
      }

      .strength-fill {
        height: 100%;
        width: 0;
        transition: all 0.3s;
      }

      .strength-weak {
        background: #f44336;
        width: 33%;
      }
      .strength-medium {
        background: #ff9800;
        width: 66%;
      }
      .strength-strong {
        background: #4caf50;
        width: 100%;
      }

      @media (max-width: 768px) {
        .auth-container {
          grid-template-columns: 1fr;
        }

        .auth-side {
          display: none;
        }

        .auth-form-container {
          padding: 2rem;
        }

        .form-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <!-- Left Side -->
      <div class="auth-side">
        <div class="auth-side-logo">SILVRE</div>
        <p class="auth-side-text">
          Hesap oluşturarak özel kampanyalardan haberdar olun ve hızlı alışveriş
          deneyimi yaşayın.
        </p>

        <ul class="auth-side-features">
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Hızlı Alışveriş
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Sipariş Takibi
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Özel Kampanyalar
          </li>
          <li>
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
            Favori Listesi
          </li>
        </ul>
      </div>

      <!-- Right Side - Register Form -->
      <div class="auth-form-container">
        <div class="auth-header">
          <h1 class="auth-title">Hesap Oluştur</h1>
          <p class="auth-subtitle">
            Zaten hesabınız var mı? <a href="/login.html">Giriş Yapın</a>
          </p>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>

        <form id="registerForm">
          <div class="form-group">
            <label class="form-label" for="fullName">Ad Soyad *</label>
            <input
              type="text"
              id="fullName"
              class="form-input"
              placeholder="Adınız Soyadınız"
              required
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">E-posta *</label>
            <input
              type="email"
              id="email"
              class="form-input"
              placeholder="ornek@email.com"
              required
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="phone">Telefon</label>
            <input
              type="tel"
              id="phone"
              class="form-input"
              placeholder="0532 123 45 67"
              autocomplete="tel"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Şifre *</label>
            <input
              type="password"
              id="password"
              class="form-input"
              placeholder="En az 6 karakter"
              required
              autocomplete="new-password"
            />
            <div
              class="password-strength"
              id="passwordStrength"
              style="display: none"
            >
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <span id="strengthText"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="passwordConfirm"
              >Şifre Tekrar *</label
            >
            <input
              type="password"
              id="passwordConfirm"
              class="form-input"
              placeholder="Şifrenizi tekrar girin"
              required
              autocomplete="new-password"
            />
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="terms" required />
            <label for="terms">
              <a href="/terms.html" target="_blank">Kullanım Şartları</a> ve
              <a href="/privacy.html" target="_blank">Gizlilik Politikası</a>'nı
              okudum, kabul ediyorum.
            </label>
          </div>

          <div class="form-checkbox">
            <input type="checkbox" id="newsletter" />
            <label for="newsletter">
              Kampanya ve yeni ürünlerden haberdar olmak istiyorum.
            </label>
          </div>

          <button type="submit" class="btn-submit" id="registerBtn">
            Hesap Oluştur
          </button>
        </form>

        <div class="back-home">
          <a href="/">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M19 12H5M12 19l-7-7 7-7" />
            </svg>
            Ana Sayfaya Dön
          </a>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script>
      const registerForm = document.getElementById("registerForm");
      const registerBtn = document.getElementById("registerBtn");
      const errorMessage = document.getElementById("errorMessage");
      const successMessage = document.getElementById("successMessage");
      const passwordInput = document.getElementById("password");
      const passwordStrength = document.getElementById("passwordStrength");

      // Check if already logged in
      if (auth.isAuthenticated()) {
        window.location.href = "/";
      }

      // Password strength checker
      passwordInput.addEventListener("input", () => {
        const password = passwordInput.value;

        if (password.length === 0) {
          passwordStrength.style.display = "none";
          return;
        }

        passwordStrength.style.display = "block";

        const strengthFill = document.getElementById("strengthFill");
        const strengthText = document.getElementById("strengthText");

        let strength = 0;
        if (password.length >= 6) strength++;
        if (password.length >= 8) strength++;
        if (/[A-Z]/.test(password)) strength++;
        if (/[0-9]/.test(password)) strength++;
        if (/[^A-Za-z0-9]/.test(password)) strength++;

        strengthFill.className = "strength-fill";

        if (strength <= 2) {
          strengthFill.classList.add("strength-weak");
          strengthText.textContent = "Zayıf";
          strengthText.style.color = "#F44336";
        } else if (strength <= 4) {
          strengthFill.classList.add("strength-medium");
          strengthText.textContent = "Orta";
          strengthText.style.color = "#FF9800";
        } else {
          strengthFill.classList.add("strength-strong");
          strengthText.textContent = "Güçlü";
          strengthText.style.color = "#4CAF50";
        }
      });

      registerForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const passwordConfirm =
          document.getElementById("passwordConfirm").value;
        const terms = document.getElementById("terms").checked;

        // Validation
        if (!terms) {
          showError("Kullanım şartlarını kabul etmelisiniz");
          return;
        }

        if (password !== passwordConfirm) {
          showError("Şifreler eşleşmiyor");
          return;
        }

        if (password.length < 6) {
          showError("Şifre en az 6 karakter olmalıdır");
          return;
        }

        registerBtn.disabled = true;
        registerBtn.textContent = "Hesap oluşturuluyor...";
        errorMessage.classList.remove("show");
        successMessage.classList.remove("show");

        try {
          await api.register({
            full_name: fullName,
            email: email,
            phone: phone || null,
            password: password,
          });

          showSuccess(
            "Hesabınız başarıyla oluşturuldu! Yönlendiriliyorsunuz..."
          );

          // Redirect after success
          setTimeout(() => {
            const redirect = getRedirectUrl();
            window.location.href = redirect || "/";
          }, 2000);
        } catch (error) {
          console.error("Register error:", error);
          showError(
            error.message ||
              "Kayıt sırasında bir hata oluştu. Lütfen tekrar deneyin."
          );

          registerBtn.disabled = false;
          registerBtn.textContent = "Hesap Oluştur";
        }
      });

      function showError(message) {
        errorMessage.textContent = message;
        errorMessage.classList.add("show");
        successMessage.classList.remove("show");
      }

      function showSuccess(message) {
        successMessage.textContent = message;
        successMessage.classList.add("show");
        errorMessage.classList.remove("show");
      }

      function getRedirectUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get("redirect");
      }
    </script>
  </body>
</html>
